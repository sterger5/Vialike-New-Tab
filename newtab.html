<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新标签页</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background-layer" id="backgroundLayer"></div>
  <div class="background-overlay"></div>
  
  <div class="wallpaper-sidebar" id="wallpaperSidebar">
    <div class="sidebar-header">
      <h3 id="sidebarTitle">壁纸选择</h3>
      <button class="sidebar-close" id="sidebarClose">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-content">
      <div class="sidebar-source-tabs">
        <button class="sidebar-source-btn active" data-source="bing">必应壁纸</button>
        <button class="sidebar-source-btn" data-source="wallhaven">Wallhaven</button>
      </div>
      <div class="sidebar-gallery" id="sidebarGallery">
        <div class="wallpaper-grid" id="sidebarWallpapers"></div>
      </div>
      <button class="refresh-btn sidebar-refresh" id="sidebarRefresh">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
        更新壁纸
      </button>
    </div>
  </div>
  
  <div class="bookmarks-bar" id="bookmarksBar">
    <div class="bookmarks-container" id="bookmarksContainer"></div>
  </div>
  
  <main class="container">
    <div class="search-area">
      <div class="logo" id="logo">Vialike</div>
      <div class="search-wrapper" id="searchWrapper">
        <input type="text" class="search-box" id="searchBox" placeholder="搜索或输入网址" autocomplete="off">
        <button class="search-btn" id="searchBtn">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
    </div>
  </main>

  <button class="settings-btn" id="settingsBtn" title="设置">
    <svg viewBox="0 0 24 24" width="24" height="24">
      <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
    </svg>
  </button>

  <div class="settings-modal" id="settingsModal">
    <div class="settings-content">
      <div class="settings-header">
        <h2>设置</h2>
        <button class="close-btn" id="closeBtn">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      
      <div class="settings-tabs">
        <button class="tab-btn active" data-tab="logo">Logo</button>
        <button class="tab-btn" data-tab="searchbox">搜索框</button>
        <button class="tab-btn" data-tab="background">背景</button>
        <button class="tab-btn" data-tab="searchengine">搜索引擎</button>
        <button class="tab-btn" data-tab="advanced">高级</button>
      </div>

      <div class="settings-body">
        <div class="tab-content active" id="logo-tab">
          <div class="setting-item">
            <label>Logo文字</label>
            <input type="text" id="logoText" value="Vialike">
          </div>
          <div class="setting-item">
            <label>字体大小</label>
            <input type="range" id="logoFontSize" min="24" max="120" value="64">
            <span class="range-value" id="logoFontSizeValue">64px</span>
          </div>
          <div class="setting-item">
            <label>字体风格</label>
            <select id="logoFontFamily">
              <option value="'Segoe UI', sans-serif">默认</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
              <option value="Georgia, serif">Georgia</option>
              <option value="'Courier New', monospace">Courier New</option>
              <option value="Verdana, sans-serif">Verdana</option>
              <option value="Impact, sans-serif">Impact</option>
              <option value="cursive">手写体</option>
              <option value="fantasy">艺术体</option>
            </select>
          </div>
          <div class="setting-item">
            <label>字体样式</label>
            <div class="font-style-options">
              <button class="font-style-btn" id="logoBold" title="粗体">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path fill="currentColor" d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/>
                </svg>
              </button>
              <button class="font-style-btn" id="logoItalic" title="斜体">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path fill="currentColor" d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="tab-content" id="searchbox-tab">
          <div class="setting-item">
            <label>搜索框样式</label>
            <div class="style-options">
              <button class="style-btn active" data-style="rect" title="矩形">
                <svg viewBox="0 0 60 30" width="60" height="30">
                  <rect x="2" y="5" width="56" height="20" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
              </button>
              <button class="style-btn" data-style="line" title="线条">
                <svg viewBox="0 0 60 30" width="60" height="30">
                  <line x1="2" y1="25" x2="58" y2="25" stroke="currentColor" stroke-width="2"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="setting-item">
            <label>圆角值</label>
            <input type="range" id="searchBorderRadius" min="0" max="50" value="24">
            <span class="range-value" id="searchBorderRadiusValue">24px</span>
          </div>
          <div class="setting-item">
            <label>不透明度</label>
            <input type="range" id="searchOpacity" min="0" max="100" value="100">
            <span class="range-value" id="searchOpacityValue">100%</span>
          </div>
          <div class="setting-item">
            <label>描边粗细</label>
            <input type="range" id="searchBorderWidth" min="0" max="5" value="1" step="0.5">
            <span class="range-value" id="searchBorderWidthValue">1px</span>
          </div>
          <div class="setting-item">
            <label>描边不透明度</label>
            <input type="range" id="searchBorderOpacity" min="0" max="100" value="20">
            <span class="range-value" id="searchBorderOpacityValue">20%</span>
          </div>
          <div class="setting-item">
            <label>显示提示文字</label>
            <div class="toggle-switch">
              <input type="checkbox" id="showPlaceholder" checked>
              <label for="showPlaceholder"></label>
            </div>
          </div>
          <div class="setting-item">
            <label>文字颜色</label>
            <div class="color-picker-wrapper">
              <input type="color" id="textColor" value="#333333" class="color-picker">
              <span class="color-value" id="textColorValue">#333333</span>
            </div>
          </div>
        </div>

        <div class="tab-content" id="background-tab">
          <div class="setting-item">
            <label>壁纸来源</label>
            <div class="wallpaper-source-options">
              <button class="source-btn active" data-source="local">本地图片</button>
              <button class="source-btn" data-source="bing">必应壁纸</button>
              <button class="source-btn" data-source="wallhaven">Wallhaven</button>
            </div>
          </div>
          <div class="setting-item" id="localImageSection">
            <label>背景图片</label>
            <div class="image-upload">
              <button class="save-local-btn" id="saveLocalBtn" title="保存当前壁纸到本地">
                <svg viewBox="0 0 24 24" width="16" height="16">
                  <path fill="currentColor" d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
                </svg>
                保存到本地
              </button>
              <input type="file" id="bgImage" accept="image/*" hidden>
              <button class="upload-btn" id="uploadBgBtn">选择图片</button>
              <button class="clear-btn" id="clearBgBtn">清除</button>
            </div>
          </div>
          <div class="setting-item">
            <label>主题色</label>
            <div class="theme-options">
              <button class="theme-btn light active" data-theme="light" title="亮色"></button>
              <button class="theme-btn dark" data-theme="dark" title="暗色"></button>
            </div>
          </div>
          <div class="setting-item">
            <label>背景模糊度</label>
            <input type="range" id="bgBlur" min="0" max="30" value="0">
            <span class="range-value" id="bgBlurValue">0px</span>
          </div>
        </div>

        <div class="tab-content" id="searchengine-tab">
          <div class="setting-item">
            <label>默认搜索引擎</label>
            <select id="searchEngine">
              <option value="google">Google</option>
              <option value="bing">Bing</option>
              <option value="baidu">百度</option>
              <option value="duckduckgo">DuckDuckGo</option>
              <option value="sogou">搜狗</option>
            </select>
          </div>
          <div class="setting-item">
            <label>搜索推荐</label>
            <div class="toggle-switch">
              <input type="checkbox" id="showSuggestions" checked>
              <label for="showSuggestions"></label>
            </div>
          </div>
          <div class="setting-item">
            <label>推荐行数</label>
            <input type="range" id="suggestionRows" min="3" max="10" value="5">
            <span class="range-value" id="suggestionRowsValue">5行</span>
          </div>
          <div class="setting-item">
            <label>快捷切换</label>
            <p class="hint-text">右键点击搜索框右侧的放大镜图标可弹出搜索引擎选择列表</p>
          </div>
        </div>

        <div class="tab-content" id="advanced-tab">
          <div class="setting-item">
            <label>书签栏</label>
            <div class="toggle-switch">
              <input type="checkbox" id="showBookmarks" checked>
              <label for="showBookmarks"></label>
            </div>
          </div>
          <div class="setting-item">
            <label>搜索框效果</label>
            <div class="effect-options">
              <button class="effect-btn active" data-effect="transparent">透明</button>
              <button class="effect-btn" data-effect="blur">模糊</button>
            </div>
          </div>
          <div class="setting-item blur-intensity-setting" id="blurIntensitySetting">
            <label>模糊强度</label>
            <input type="range" id="blurIntensity" min="1" max="30" value="10">
            <span class="range-value" id="blurIntensityValue">10px</span>
          </div>
          <div class="setting-item">
            <label>搜索区域</label>
            <div class="toggle-switch">
              <input type="checkbox" id="showSearchArea" checked>
              <label for="showSearchArea"></label>
            </div>
          </div>
          <div class="setting-item">
            <label>纵向位置</label>
            <input type="range" id="positionY" min="0" max="100" value="25">
            <span class="range-value" id="positionYValue">25%</span>
          </div>
          <div class="setting-item">
            <label>横向位置</label>
            <input type="range" id="positionX" min="0" max="100" value="50">
            <span class="range-value" id="positionXValue">50%</span>
          </div>
          <div class="setting-item">
            <label>位置重置</label>
            <div class="center-buttons">
              <button class="center-btn" id="centerX">横向居中</button>
              <button class="center-btn" id="centerY">纵向默认</button>
            </div>
          </div>
          <div class="setting-item">
            <label>恢复默认</label>
            <button class="reset-btn" id="resetSettings">恢复默认设置</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
